version: "3.9"

services:
  postgresql:
    image: pgvector/pgvector:pg16
    container_name: tcm-postgresql
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./configs/sql:/docker-entrypoint-initdb.d
    networks:
      - app-network

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    networks:
      - app-network

  ui-backend:
    build:
      context: ./UI/backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgresql
    volumes:
      - ./UI/frontend:/frontend:ro
    depends_on:
      - postgresql
      - minio
    networks:
      - app-network

  data-process:
    build:
      context: ./data_process
    container_name: tcm-data-process
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgresql
      MINIO_ENDPOINT: minio:9000
    depends_on:
      - postgresql
      - minio
    networks:
      - app-network

  agent-worker:
    build:
      context: ./agent
    command: tail -f /dev/null
    depends_on:
      - postgresql
      - minio
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
