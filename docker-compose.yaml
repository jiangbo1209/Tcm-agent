version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tcm-postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./configs/sql:/docker-entrypoint-initdb.d
    networks:
      - app-network

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    networks:
      - app-network

  kg-backend:
    build:
      context: ./knowledge_graph/TCM-code/backend
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    networks:
      - app-network

  kg-frontend:
    image: nginx:latest
    volumes:
      - ./knowledge_graph/TCM-code/frontend:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    networks:
      - app-network

  agent-worker:
    build:
      context: ./agent
    command: tail -f /dev/null
    depends_on:
      - postgres
      - minio
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
