name: Tcm-agent
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # Backend (FastAPI)
    - fastapi>=0.110,<1.0
    - uvicorn[standard]>=0.30,<1.0
    - python-multipart>=0.0.9
    - python-jose[cryptography]>=3.3,<4.0
    - passlib[bcrypt]>=1.7,<2.0
    - bcrypt>=4.0.1,<4.1
    # Database
    - sqlalchemy[asyncio]>=2.0,<3.0
    - psycopg2-binary>=2.9,<3.0
    - asyncpg>=0.29,<1.0
    - aiosqlite>=0.19.0
    # Config & Utils
    - python-dotenv>=1.0,<2.0
    - pydantic>=2.7,<3.0
    - pydantic-settings>=2.2,<3.0
    # Storage
    - minio>=7.2,<8.0
    # HTTP & Scraping
    - requests>=2.31,<3.0
    - httpx>=0.25.0
    - aiohttp>=3.9.3
    - yarl>=1.9.4
    - beautifulsoup4>=4.12.0
    - lxml>=4.9.0
    # Data Processing
    - pandas>=2.0.0
    - jsonschema>=4.17,<5.0
    - tqdm>=4.65,<5.0
    # Logging
    - loguru>=0.7.0
    - rich>=13.0,<14.0
    # Testing
    - pytest>=7.0.0
    - pytest-asyncio>=0.21.0
    # Browser Automation
    - playwright>=1.42.0
